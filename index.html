*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0f0f0f;--bg1:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --border:#333;--border2:#444;

  --green:#4caf7d;--green-bg:#1a2e22;
  --amber:#f0a830;--amber-bg:#2e2010;
  --red:#e05555;--red-bg:#2e1515;
  --purple:#9b7fe8;--purple-bg:#231a38;
  --radius:12px;--radius-sm:8px;

html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text1)}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg0)}
.header{background:var(--bg1);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,0) 20px 12px;padding-top:calc(env(safe-area-inset-top,0px) + 16px);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:600;color:var(--text1);letter-spacing:-0.3px}
.logo span{color:var(--blue)}
.header-sub{font-size:13px;color:var(--text2);margin-top:3px}
.tab-bar{display:flex;background:var(--bg1);border-bottom:0.5px solid var(--border);padding:0 8px;flex-shrink:0}
.tab{flex:1;padding:11px 4px;font-size:13px;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-align:center;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px);-webkit-overflow-scrolling:touch}
.section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 10px}
.metrics-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.metric.clickable{cursor:pointer;transition:opacity 0.15s}
.metric.clickable:active{opacity:0.7}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600;color:var(--text1)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.metric-value.green{color:var(--green)}
.metric-value.amber{color:var(--amber)}
.metric-value.blue{color:var(--blue)}

.car-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.car-model{font-size:15px;font-weight:500;color:var(--text1);line-height:1.3}
.car-brand{font-size:13px;color:var(--text2);margin-top:1px}
.car-plate{font-size:11px;color:var(--text3);margin-top:3px;font-family:ui-monospace,monospace}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500;white-space:nowrap}
.badge-stock{background:var(--blue-bg);color:var(--blue)}

.car-num-label{font-size:11px;color:var(--text2);margin-bottom:2px}

// ── CAMBIAR ESTE PIN ──────────────────────────────────────
const PIN = '1234';
// ─────────────────────────────────────────────────────────

let pinInput = '';
function pinPress(v) {
  document.getElementById('pin-error').textContent = '';
  if (v === 'back') { pinInput = pinInput.slice(0, -1); updateDots(); return; }
  if (pinInput.length >= 4) return;
  pinInput += v;
  updateDots();
  if (pinInput.length === 4) {
    setTimeout(() => {
      if (pinInput === PIN) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        render();
      } else {
        document.getElementById('pin-error').textContent = 'PIN incorrecto';
        pinInput = ''; updateDots();
      }
    }, 150);
  }
}
function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).className = 'pin-dot' + (i < pinInput.length ? ' filled' : '');
}
function lockApp() {
  pinInput = ''; updateDots();
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}

  {fecha:'20/5/2026',tipo:'Retiro de Socio',patente:'AB 373 NH',marca:'Renault',modelo:'Duster PH2 Privilege 2.0',pagado:'Ariel',valor:1067000,desc:'Retiro ganancia'},
  {fecha:'3/6/2026',tipo:'Gasto',patente:'AB 507 MD',marca:'Renault',modelo:'Sandero Stepway Privilege',pagado:'Fondo',valor:180000,desc:'Múltiple Admisión y Electroventilador'},
  {fecha:'3/6/2026',tipo:'Compra',patente:'AC 531 JR',marca:'Renault',modelo:'Kangoo PH3 Confort GNC',pagado:'Fondo',valor:10000000,desc:'Compra'},
  {fecha:'10/6/2026',tipo:'Compra',patente:'KXZ 865',marca:'Peugeot',modelo:'Partner Patagónica 1.6N VTC',pagado:'Fondo',valor:9000000,desc:'Compra'},
  {fecha:'10/6/2026',tipo:'Gasto',patente:'KXZ 865',marca:'Peugeot',modelo:'Partner Patagónica 1.6N VTC',pagado:'Fondo',valor:30000,desc:'Uber'},
];

function getCarData() {
  const cars = {};
  movimientos.forEach(m => {
    const k = m.patente;
    if (!cars[k]) cars[k] = {patente:k, marca:m.marca, modelo:m.modelo, movs:[], compra:0, gastos:0, venta:0, retiros:0, fechaCompra:null, fechaVenta:null};
    cars[k].movs.push(m);
    if (m.tipo === 'Compra') { cars[k].compra += m.valor; if (!cars[k].fechaCompra) cars[k].fechaCompra = m.fecha; }
    else if (m.tipo === 'Gasto') cars[k].gastos += m.valor;
    else if (m.tipo === 'Venta') { cars[k].venta += m.valor; cars[k].fechaVenta = m.fecha; }
    else if (m.tipo === 'Retiro de Socio') cars[k].retiros += m.valor;
  });
  Object.values(cars).forEach(c => {
    c.vendido = c.venta > 0;
    c.inversion = c.compra + c.gastos;
    c.ganancia = c.vendido ? (c.venta - c.inversion) : null;
  });
  return cars;
}
const CARS = getCarData();

function getRetirosBySocio() {
  const s = {};
  movimientos.filter(m => m.tipo === 'Retiro de Socio').forEach(m => { s[m.pagado] = (s[m.pagado] || 0) + m.valor; });
  return s;
}

function parseDate(str) {
  const p = str.replace('20226','2026').split('/');
  return new Date(+p[2], +p[1]-1, +p[0]);
}

let currentTab = 'dashboard';
let drillView = null;
let detailCar = null;

function showTab(tab) {
  currentTab = tab; drillView = null; detailCar = null;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['dashboard','stock','vendidos'][i] === tab));
  const subs = {dashboard:'Resumen general', stock:'Autos en stock', vendidos:'Autos vendidos'};
  document.getElementById('header-sub').textContent = subs[tab];
  render();
}

function render() {
  const el = document.getElementById('main-content');
  if (detailCar) { el.innerHTML = renderDetail(detailCar); return; }
  if (drillView) { el.innerHTML = renderDrill(drillView); return; }
  if (currentTab === 'dashboard') el.innerHTML = renderDashboard();
  else if (currentTab === 'stock') el.innerHTML = renderStock();
  else el.innerHTML = renderVendidos();
}

function renderDashboard() {
  const cars = Object.values(CARS);
  const vendidos = cars.filter(c => c.vendido);
  const enStock = cars.filter(c => !c.vendido);
  const gananciaTotal = vendidos.reduce((s, c) => s + c.ganancia, 0);
  const inversionStock = enStock.reduce((s, c) => s + c.inversion, 0);
  const retiros = getRetirosBySocio();
  const maxRet = Math.max(...Object.values(retiros), 1);
  const socios = ['Ariel', 'Miguel', 'Martin'];
  return `
    <div class="section-label">resumen</div>
    <div class="metrics-grid">
      <div class="metric clickable" onclick="showDrill('stock')">
        <div class="metric-label">Autos en stock</div>
        <div class="metric-value blue">${enStock.length}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('vendidos')">
        <div class="metric-label">Vendidos</div>
        <div class="metric-value green">${vendidos.length}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('ganancia')">
        <div class="metric-label">Ganancia realizada</div>
        <div class="metric-value ${gananciaTotal >= 0 ? 'green' : ''}">${fmtK(gananciaTotal)}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('capital')">
        <div class="metric-label">Capital en stock</div>
        <div class="metric-value amber">${fmtK(inversionStock)}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
    </div>
    <div class="section-label">retiros por socio</div>
    <div class="chart-wrap">
      <div class="chart-label">acumulado total</div>
      ${socios.map(s => {
        const v = retiros[s] || 0;
        const pct = Math.round(v / maxRet * 100);
        return `<div class="bar-row">
          <div class="bar-name">${s}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--blue)">
            <span class="bar-val">${fmtK(v)}</span>
          </div></div>
        </div>`;
      }).join('')}
    </div>`;
}

function showDrill(type) {
  drillView = type;
  const labels = {stock:'Autos en stock', vendidos:'Autos vendidos', ganancia:'Ganancia realizada', capital:'Capital en stock'};
  document.getElementById('header-sub').textContent = labels[type];
  render();
}

function carCard(c, isVendido) {
  const fechas = isVendido
    ? `<div class="car-date">📅 Compra: ${c.fechaCompra} &nbsp;·&nbsp; Venta: ${c.fechaVenta}</div>`
    : `<div class="car-date">📅 Compra: ${c.fechaCompra}</div>`;
  const nums = isVendido
    ? `<div><div class="car-num-label">Inversión</div><div class="car-num-value">${fmtK(c.inversion)}</div></div>
       <div><div class="car-num-label">Venta</div><div class="car-num-value">${fmtK(c.venta)}</div></div>
       <div style="grid-column:1/-1"><div class="car-num-label">Ganancia neta</div><div class="car-num-value profit">${fmtK(c.ganancia)}</div></div>`
    : `<div><div class="car-num-label">Compra</div><div class="car-num-value">${fmtK(c.compra)}</div></div>
       <div><div class="car-num-label">Gastos</div><div class="car-num-value amber">${fmtK(c.gastos)}</div></div>
       <div style="grid-column:1/-1"><div class="car-num-label">Total invertido</div><div class="car-num-value">${fmtK(c.inversion)}</div></div>`;
  return `<div class="car-card" onclick="openDetail('${c.patente}')">
    <div class="car-header">
      <div>
        <div class="car-model">${c.modelo}</div>
        <div class="car-brand">${c.marca}</div>
        <div class="car-plate">${c.patente}</div>
      </div>
      <span class="badge ${isVendido ? 'badge-vendido' : 'badge-stock'}">${isVendido ? 'Vendido' : 'En stock'}</span>
    </div>
    ${fechas}
    <div class="car-numbers">${nums}</div>
  </div>`;
}

function renderDrill(type) {
  const cars = Object.values(CARS);
  const isVend = type === 'vendidos' || type === 'ganancia';
  const list = isVend ? cars.filter(c => c.vendido) : cars.filter(c => !c.vendido);
  const title = isVend ? 'Vendidos' : 'En stock';
  return `
    <button class="back-btn" onclick="drillView=null;document.getElementById('header-sub').textContent='Resumen general';render()">
      ← Dashboard
    </button>
    <div class="section-label">${title} (${list.length})</div>
    ${list.map(c => carCard(c, isVend)).join('')}`;
}

function renderStock() {
  const cars = Object.values(CARS).filter(c => !c.vendido);
  if (!cars.length) return '<div class="empty">No hay autos en stock</div>';
  return `<div class="section-label">en stock (${cars.length})</div>${cars.map(c => carCard(c, false)).join('')}`;
}

function renderVendidos() {
  const cars = Object.values(CARS).filter(c => c.vendido);
  if (!cars.length) return '<div class="empty">No hay autos vendidos aún</div>';
  return `<div class="section-label">vendidos (${cars.length})</div>${cars.map(c => carCard(c, true)).join('')}`;
}

function openDetail(patente) {
  detailCar = patente;
  document.getElementById('header-sub').textContent = CARS[patente].marca + ' · ' + patente;
  render();
}

function closeDetail() {
  detailCar = null;
  if (drillView) {
    const labels = {stock:'Autos en stock', vendidos:'Autos vendidos', ganancia:'Ganancia realizada', capital:'Capital en stock'};
    document.getElementById('header-sub').textContent = labels[drillView];
  } else {
    const subs = {dashboard:'Resumen general', stock:'Autos en stock', vendidos:'Autos vendidos'};
    document.getElementById('header-sub').textContent = subs[currentTab];
  }
  render();
}

const tipoIcon = {Compra:'⬇', Venta:'⬆', Gasto:'🧾', 'Retiro de Socio':'👤', 'Reposicion USD':'$'};
const tipoClass = {Compra:'compra', Venta:'venta', Gasto:'gasto', 'Retiro de Socio':'retiro', 'Reposicion USD':'reposicion'};

function movCard(m) {
  const isPos = m.tipo === 'Venta';
  return `<div class="mov-item">
    <div class="mov-icon ${tipoClass[m.tipo] || 'gasto'}">${tipoIcon[m.tipo] || '·'}</div>
    <div class="mov-body">
      <div class="mov-desc">${m.desc}</div>
      <div class="mov-meta">${m.fecha}${m.pagado && m.pagado !== 'Fondo' ? ' · ' + m.pagado : ''}</div>
    </div>
    <div class="mov-amount ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : '-'}${fmtK(m.valor)}</div>
  </div>`;
}

let gastosVisible = false;
function toggleGastos() {
  gastosVisible = !gastosVisible;
  document.getElementById('movs-list').style.display = gastosVisible ? 'none' : 'block';
  document.getElementById('gastos-list').style.display = gastosVisible ? 'block' : 'none';
  document.getElementById('gastos-btn').textContent = gastosVisible ? '← Ver todos los movimientos' : '⧗ Ver solo gastos';
}

function renderDetail(patente) {
  const c = CARS[patente];
  gastosVisible = false;
  const movsSorted = [...c.movs].sort((a, b) => parseDate(a.fecha) - parseDate(b.fecha));
  const gastosSorted = movsSorted.filter(m => m.tipo === 'Gasto');
  return `
    <button class="back-btn" onclick="closeDetail()">← Volver</button>
    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <div class="detail-title">${c.modelo}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">${c.marca}</div>
          <div class="detail-plate">${c.patente}</div>
        </div>
        <span class="badge ${c.vendido ? 'badge-vendido' : 'badge-stock'}">${c.vendido ? 'Vendido' : 'En stock'}</span>
      </div>
      <div style="border-top:0.5px solid var(--border);padding-top:12px">
        <div class="result-block"><span class="result-label">Fecha compra</span><span class="result-val">${c.fechaCompra}</span></div>
        ${c.fechaVenta ? `<div class="result-block"><span class="result-label">Fecha venta</span><span class="result-val">${c.fechaVenta}</span></div>` : ''}
        <div class="result-block"><span class="result-label">Compra</span><span class="result-val">${fmt(c.compra)}</span></div>
        <div class="result-block"><span class="result-label">Gastos</span><span class="result-val">${fmt(c.gastos)}</span></div>
        <div class="result-block"><span class="result-label" style="font-weight:500">Total invertido</span><span class="result-val" style="font-size:16px">${fmt(c.inversion)}</span></div>
        ${c.vendido ? `
          <div class="result-block"><span class="result-label">Precio de venta</span><span class="result-val">${fmt(c.venta)}</span></div>
          <div class="result-block"><span class="result-label" style="font-weight:500">Ganancia neta</span>
            <span class="result-val" style="color:${c.ganancia >= 0 ? 'var(--green)' : 'var(--red)'};font-size:17px">${fmt(c.ganancia)}</span>
          </div>` : ''}
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-label" style="margin:0">movimientos (${movsSorted.length})</div>
      <button class="filter-btn" id="gastos-btn" onclick="toggleGastos()">⧗ Ver solo gastos</button>
    </div>
    <div id="movs-list">${movsSorted.map(movCard).join('')}</div>
    <div id="gastos-list" style="display:none">${gastosSorted.map(movCard).join('')}</div>
  `;
}

render();

// ── SERVICE WORKER ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
