<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Embusteros">
<meta name="theme-color" content="#0f0f0f">
<title>Embusteros SRL</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0f0f0f;--bg1:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --border:#333;--border2:#444;
  --text1:#f0f0f0;--text2:#a0a0a0;--text3:#666;
  --blue:#4a9eff;--blue-bg:#1a2d42;
  --green:#4caf7d;--green-bg:#1a2e22;
  --amber:#f0a830;--amber-bg:#2e2010;
  --red:#e05555;--red-bg:#2e1515;
  --purple:#9b7fe8;--purple-bg:#231a38;
  --radius:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text1)}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg0)}
.header{background:var(--bg1);border-bottom:0.5px solid var(--border);padding:env(safe-area-inset-top,0) 20px 12px;padding-top:calc(env(safe-area-inset-top,0px) + 16px);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:34px;font-weight:600;color:var(--text1);letter-spacing:-0.3px}
.logo span{color:var(--blue)}
.header-sub{font-size:26px;color:var(--text2);margin-top:3px}
.tab-bar{display:flex;background:var(--bg1);border-bottom:0.5px solid var(--border);padding:0 8px;flex-shrink:0}
.tab{flex:1;padding:11px 4px;font-size:26px;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;text-align:center;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px);-webkit-overflow-scrolling:touch}
.section-label{font-size:22px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 10px}
.metrics-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.metric.clickable{cursor:pointer;transition:opacity 0.15s}
.metric.clickable:active{opacity:0.7}
.metric-label{font-size:24px;color:var(--text2);margin-bottom:6px}
.metric-value{font-size:44px;font-weight:600;color:var(--text1)}
.metric-sub{font-size:22px;color:var(--text3);margin-top:3px}
.metric-value.green{color:var(--green)}
.metric-value.amber{color:var(--amber)}
.metric-value.blue{color:var(--blue)}
.car-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px;cursor:pointer;transition:opacity 0.15s}
.car-card:active{opacity:0.7}
.car-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.car-model{font-size:28px;font-weight:500;color:var(--text1);line-height:1.3}
.car-brand{font-size:28px;color:var(--text1);margin-top:1px}
.car-plate{font-size:28px;color:var(--text1);margin-top:3px;font-family:ui-monospace,monospace}
.badge{font-size:20px;padding:5px 12px;border-radius:99px;font-weight:500;white-space:nowrap}
.badge-stock{background:var(--blue-bg);color:var(--blue)}
.badge-vendido{background:var(--green-bg);color:var(--green)}
.car-date{font-size:22px;color:var(--text3);margin:4px 0;display:flex;align-items:center;gap:4px}
.car-numbers{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:10px;border-top:0.5px solid var(--border)}
.car-num-label{font-size:22px;color:var(--text2);margin-bottom:2px}
.car-num-value{font-size:28px;font-weight:500;color:var(--text1)}
.car-num-value.profit{color:var(--green)}
.car-num-value.amber{color:var(--amber)}
.detail-header{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.detail-title{font-size:36px;font-weight:600;margin-bottom:2px}
.detail-plate{font-size:28px;color:var(--text1);font-family:ui-monospace,monospace}
.result-block{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border)}
.result-block:last-child{border-bottom:none}
.result-label{font-size:26px;color:var(--text2)}
.result-val{font-size:28px;font-weight:500;color:var(--text1)}
.mov-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.mov-body{flex:1;min-width:0}
.mov-desc{font-size:22px;color:var(--text1);white-space:normal}
.mov-meta{font-size:22px;color:var(--text3);margin-top:2px}
.mov-amount{font-size:22px;font-weight:500;text-align:right;white-space:nowrap;flex-shrink:0}
.mov-amount.neg{color:var(--red)}
.mov-amount.pos{color:var(--green)}
.chart-wrap{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:15px 16px;margin-bottom:14px}
.chart-label{font-size:24px;color:var(--text2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-name{font-size:24px;color:var(--text2);width:80px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:32px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-right:8px;justify-content:flex-end}
.bar-val{font-size:20px;font-weight:500;color:#fff}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:28px;line-height:1.6}
/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:32px;padding-top:calc(env(safe-area-inset-top,0px) + 32px)}
.pin-logo{font-size:40px;font-weight:600;color:var(--text1);margin-bottom:6px}
.pin-logo span{color:var(--blue)}
.pin-sub{font-size:26px;color:var(--text2);margin-bottom:40px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border2);transition:all 0.15s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-error{color:var(--red);font-size:24px;margin-bottom:16px;min-height:24px;text-align:center}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:300px}
.pin-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);height:80px;font-size:32px;font-weight:500;color:var(--text1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s}
.pin-btn:active{background:var(--bg3)}
</style>
</head>
<body>

<div id="pin-screen" class="pin-screen">
  <div class="pin-logo">Embusteros<span>SRL</span></div>
  <div class="pin-sub">Ingresá tu PIN para continuar</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" style="background:none;border-color:transparent;font-size:20px" onclick="pinPress('back')">⌫</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" style="background:none;border-color:transparent"></button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="logo">Embusteros<span>SRL</span></div>
      <span id="header-back" style="font-size:26px;color:var(--blue);cursor:pointer;display:none" onclick="goBack()">← Atrás</span>
      <span style="font-size:26px;color:var(--text3);cursor:pointer" onclick="loadData()" title="Actualizar">↻</span>
    </div>
    <div class="header-sub" id="header-sub">Cargando…</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('stock')">Stock</button>
    <button class="tab" onclick="showTab('vendidos')">Vendidos</button>
  </div>
  <div class="content" id="main-content"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const PIN = '10500';
// Pegá acá la URL de tu Web App de Apps Script después de publicarla:
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyLElerFX73_c4y5lfmqE0XDxMCLccoOXQBZB5puSYjapA2UPyZrs2uyAqM2ZuEYNHQ/exec';
// ─────────────────────────────────────────────────────────

// ── PIN ───────────────────────────────────────────────────
let pinInput = '';
function pinPress(v) {
  document.getElementById('pin-error').textContent = '';
  if (v === 'back') { pinInput = pinInput.slice(0,-1); updateDots(); return; }
  if (pinInput.length >= PIN.length) return;
  pinInput += v;
  updateDots();
  if (pinInput.length === PIN.length) {
    setTimeout(() => {
      if (pinInput === PIN) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadData();
      } else {
        document.getElementById('pin-error').textContent = 'PIN incorrecto';
        pinInput = ''; updateDots();
      }
    }, 150);
  }
}
function updateDots() {
  for (let i = 0; i < PIN.length; i++)
    document.getElementById('d'+i).className = 'pin-dot' + (i < pinInput.length ? ' filled' : '');
}

// ── FORMATO ───────────────────────────────────────────────
const fmt  = n => '$' + Math.round(n).toLocaleString('es-AR');
const fmtK = n => {
  if (Math.abs(n) >= 1000000) return (n<0?'-':'') + '$' + (Math.abs(n)/1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000)    return (n<0?'-':'') + '$' + Math.round(Math.abs(n)/1000) + 'k';
  return fmt(n);
};

function parseDate(val) {
  const s = String(val);
  if (s.includes('T') || s.includes('-')) return new Date(s);
  const p = s.split('/');
  return new Date(+p[2], +p[1]-1, +p[0]);
}
// ── DATOS ─────────────────────────────────────────────────
let movimientos = [];
let CARS = {};

function buildCars(movs) {
  const cars = {};
  movs.forEach(m => {
    const k = m.patente;
    if (!cars[k]) cars[k] = {patente:k, marca:m.marca, modelo:m.modelo, movs:[], compra:0, gastos:0, venta:0, retiros:0, fechaCompra:null, fechaVenta:null};
    cars[k].movs.push(m);
    if      (m.tipo === 'Compra')         { cars[k].compra  += m.valor; if (!cars[k].fechaCompra) cars[k].fechaCompra = m.fecha; }
    else if (m.tipo === 'Gasto')          { cars[k].gastos  += m.valor; }
    else if (m.tipo === 'Venta')          { cars[k].venta   += m.valor; cars[k].fechaVenta = m.fecha; }
    else if (m.tipo === 'Retiro de Socio'){ cars[k].retiros += m.valor; }
  });
  Object.values(cars).forEach(c => {
    c.vendido   = c.venta > 0;
    c.inversion = c.compra + c.gastos;
    c.ganancia  = c.vendido ? (c.venta - c.inversion) : null;
  });
  return cars;
}

function getRetirosBySocio() {
  const s = {};
  movimientos.filter(m => m.tipo === 'Retiro de Socio')
    .forEach(m => { s[m.pagado] = (s[m.pagado]||0) + m.valor; });
  return s;
}

function formatFecha(val) {
  if (!val) return '';
  const s = String(val);
  // ISO format: 2026-01-22T03:00:00.000Z
  if (s.includes('T') || s.includes('-')) {
    const d = new Date(s);
    if (!isNaN(d)) return `${d.getUTCDate()}/${d.getUTCMonth()+1}/${d.getUTCFullYear()}`;
  }
  // ya está en DD/MM/YYYY
  return s;
}

// ── CARGA DESDE GOOGLE SHEETS ─────────────────────────────
async function loadData() {
  document.getElementById('header-sub').textContent = 'Cargando…';
  document.getElementById('main-content').innerHTML =
    '<div class="empty">Cargando datos…</div>';
  try {
    const res  = await fetch(SHEET_URL);
    const rows = await res.json();
    movimientos = rows
      .filter(r => r['Patente'] && r['Tipo'])
      .map(r => ({
        fecha:   formatFecha(r['Fecha'])  || '',
        tipo:    r['Tipo']        || '',
        patente: r['Patente']     || '',
        marca:   r['Marca']       || '',
        modelo:  r['Modelo']      || '',
        pagado:  r['Pagado por']  || '',
        desc:    r['Descripcion'] || '',
        valor:   parseFloat(r['Valor']) || 0,
      }));
    CARS = buildCars(movimientos);
    console.log('Retiros fechas:', movimientos.filter(m=>m.tipo==='Retiro de Socio').map(m=>m.fecha));
    currentTab = 'dashboard';
    document.getElementById('header-sub').textContent = 'Resumen general';
    updateBackBtn();
    render();
  } catch(e) {
    document.getElementById('header-sub').textContent = 'Error';
    document.getElementById('main-content').innerHTML =
      `<div class="empty" style="color:var(--red)">No se pudieron cargar los datos.<br><br>
       <button onclick="loadData()" style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 24px;font-size:22px;color:var(--blue);cursor:pointer">Reintentar</button></div>`;
  }
}

// ── NAVEGACIÓN ────────────────────────────────────────────
let currentTab = 'dashboard';
let drillView  = null;
let detailCar  = null;

function updateBackBtn() {
  document.getElementById('header-back').style.display = (drillView || detailCar) ? 'inline' : 'none';
}

function goBack() {
  if (detailCar) { closeDetail(); return; }
  if (drillView) { drillView = null; document.getElementById('header-sub').textContent = 'Resumen general'; updateBackBtn(); render(); }
}

function showTab(tab) {
  currentTab = tab; drillView = null; detailCar = null;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['dashboard','stock','vendidos'][i] === tab));
  const subs = {dashboard:'Resumen general', stock:'Autos en stock', vendidos:'Autos vendidos'};
  document.getElementById('header-sub').textContent = subs[tab];
  updateBackBtn(); render();
}

function showDrill(type) {
  drillView = type;
  const labels = {stock:'Autos en stock', vendidos:'Autos vendidos', ganancia:'Ganancia', capital:'Invertido'};
  document.getElementById('header-sub').textContent = labels[type];
  updateBackBtn(); render();
}

function openDetail(patente) {
  detailCar = patente;
  document.getElementById('header-sub').textContent = CARS[patente].marca + ' · ' + patente;
  updateBackBtn(); render();
}

function closeDetail() {
  detailCar = null;
  if (drillView) {
    const labels = {stock:'Autos en stock', vendidos:'Autos vendidos', ganancia:'Ganancia', capital:'Invertido'};
    document.getElementById('header-sub').textContent = labels[drillView];
  } else {
    const subs = {dashboard:'Resumen general', stock:'Autos en stock', vendidos:'Autos vendidos'};
    document.getElementById('header-sub').textContent = subs[currentTab];
  }
  updateBackBtn(); render();
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  if (detailCar) { el.innerHTML = renderDetail(detailCar); return; }
  if (drillView) { el.innerHTML = renderDrill(drillView);  return; }
  if (currentTab === 'dashboard') el.innerHTML = renderDashboard();
  else if (currentTab === 'stock') el.innerHTML = renderStock();
  else el.innerHTML = renderVendidos();
}

function getRetirosPorMes() {
  const meses = {};
  const socios = ['Ariel','Miguel','Martin'];
  movimientos.filter(m => m.tipo === 'Retiro de Socio').forEach(m => {
    const p = m.fecha.split('/');
    if (p.length < 3) return;
    const anio = String(p[2]).slice(-2);
    const key = `${p[2]}-${p[1].padStart(2,'0')}`;
    const label = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+p[1]] + '-' + anio;
    if (!meses[key]) meses[key] = {label, socios:{}};
    meses[key].socios[m.pagado] = (meses[key].socios[m.pagado]||0) + m.valor;
  });
  return Object.entries(meses).sort((a,b)=>b[0].localeCompare(a[0])).map(([,v])=>v);
}

function calcIndicadores(vendidos) {
  const conFechas = vendidos.filter(c => c.fechaCompra && c.fechaVenta);
  let promDias = 0;
  if (conFechas.length) {
    const totalDias = conFechas.reduce((s,c) => {
      const diff = parseDate(c.fechaVenta) - parseDate(c.fechaCompra);
      return s + diff / (1000*60*60*24);
    }, 0);
    promDias = Math.round(totalDias / conFechas.length);
  }
  let promMargen = 0;
  const conGanancia = vendidos.filter(c => c.inversion > 0);
  if (conGanancia.length) {
    promMargen = Math.round(conGanancia.reduce((s,c) => s + (c.ganancia/c.inversion)*100, 0) / conGanancia.length);
  }
  return {promDias, promMargen};
}

function renderDashboard() {
  const cars           = Object.values(CARS);
  const vendidos       = cars.filter(c => c.vendido);
  const enStock        = cars.filter(c => !c.vendido);
  const gananciaTotal  = vendidos.reduce((s,c) => s+c.ganancia, 0);
  const inversionStock = enStock.reduce((s,c)  => s+c.inversion, 0);
  const {promDias, promMargen} = calcIndicadores(vendidos);
  const retirosMes = getRetirosPorMes();

  return `
    <div class="section-label">resumen</div>
    <div class="metrics-grid">
      <div class="metric clickable" onclick="showDrill('stock')">
        <div class="metric-label">En stock</div>
        <div class="metric-value blue">${enStock.length}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('vendidos')">
        <div class="metric-label">Vendidos</div>
        <div class="metric-value green">${vendidos.length}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('ganancia')">
        <div class="metric-label">Ganancia</div>
        <div class="metric-value ${gananciaTotal>=0?'green':''}">${fmtK(gananciaTotal)}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric clickable" onclick="showDrill('capital')">
        <div class="metric-label">Invertido</div>
        <div class="metric-value amber">${fmtK(inversionStock)}</div>
        <div class="metric-sub">tap para ver →</div>
      </div>
      <div class="metric">
        <div class="metric-label">Días prom.</div>
        <div class="metric-value blue">${promDias}</div>
        <div class="metric-sub">compra → venta</div>
      </div>
      <div class="metric">
        <div class="metric-label">Margen prom.</div>
        <div class="metric-value green">${promMargen}%</div>
        <div class="metric-sub">sobre inversión</div>
      </div>
    </div>
    <div class="section-label">retiros mensuales por socio</div>
    <div class="chart-wrap">
      ${(() => {
        const socios = ['Ariel','Miguel','Martin'];
        const acumPorSocio = {};
        socios.forEach(s => { acumPorSocio[s] = 0; });
        retirosMes.forEach(m => socios.forEach(s => { acumPorSocio[s] += m.socios[s]||0; }));

        // acumulado — tomo cualquier socio (todos igual)
        const socioRef = socios[0];
        const acumVal = acumPorSocio[socioRef];

        const acumHtml = `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid var(--border)">
          <span style="font-size:22px;color:var(--text2)">Acumulado c/u</span>
          <span style="font-size:26px;font-weight:600;color:var(--green)">${fmtK(acumVal)}</span>
        </div>`;

        const maxVal = Math.max(...retirosMes.map(m => m.socios[socioRef]||0), 1);
        const barsHtml = retirosMes.map(m => {
          const v = m.socios[socioRef]||0;
          const pct = Math.round(v/maxVal*100);
          return `<div class="bar-row" style="margin-bottom:10px">
            <div class="bar-name" style="width:76px;font-size:20px;white-space:nowrap;flex-shrink:0">${m.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--blue)">
              <span class="bar-val">${fmtK(v)}</span>
            </div></div>
          </div>`;
        }).join('');

        return acumHtml + barsHtml;
      })()}
    </div>`;
}

function carCard(c, isVendido) {
  const fechas = isVendido
    ? `<div class="car-date">📅 Compra: ${c.fechaCompra}</div><div class="car-date">🏁 Venta: ${c.fechaVenta}</div>`
    : `<div class="car-date">📅 Compra: ${c.fechaCompra}</div>`;
  const nums = isVendido
    ? `<div><div class="car-num-label">Inversión</div><div class="car-num-value">${fmtK(c.inversion)}</div></div>
       <div><div class="car-num-label">Venta</div><div class="car-num-value">${fmtK(c.venta)}</div></div>
       <div style="grid-column:1/-1"><div class="car-num-label">Ganancia</div><div class="car-num-value profit">${fmtK(c.ganancia)}</div></div>`
    : `<div><div class="car-num-label">Compra</div><div class="car-num-value">${fmtK(c.compra)}</div></div>
       <div><div class="car-num-label">Gastos</div><div class="car-num-value amber">${fmtK(c.gastos)}</div></div>
       <div style="grid-column:1/-1"><div class="car-num-label">Invertido</div><div class="car-num-value">${fmtK(c.inversion)}</div></div>`;
  return `<div class="car-card" onclick="openDetail('${c.patente}')">
    <div class="car-header">
      <div>
        <div class="car-model">${c.marca}</div>
        <div class="car-brand">${c.modelo}</div>
        <div class="car-plate">${c.patente}</div>
      </div>
      <span class="badge ${isVendido?'badge-vendido':'badge-stock'}">${isVendido?'Vendido':'En stock'}</span>
    </div>
    ${fechas}
    <div class="car-numbers">${nums}</div>
  </div>`;
}

function renderDrill(type) {
  const isVend = type === 'vendidos' || type === 'ganancia';
  const list   = Object.values(CARS).filter(c => isVend ? c.vendido : !c.vendido);
  const title  = isVend ? 'Vendidos' : 'En stock';
  return `<div class="section-label">${title} (${list.length})</div>
    ${list.map(c => carCard(c, isVend)).join('')}`;
}

function renderStock() {
  const cars = Object.values(CARS).filter(c => !c.vendido);
  if (!cars.length) return '<div class="empty">No hay autos en stock</div>';
  return `<div class="section-label">en stock (${cars.length})</div>${cars.map(c => carCard(c,false)).join('')}`;
}

function renderVendidos() {
  const cars = Object.values(CARS).filter(c => c.vendido);
  if (!cars.length) return '<div class="empty">No hay autos vendidos aún</div>';
  return `<div class="section-label">vendidos (${cars.length})</div>${cars.map(c => carCard(c,true)).join('')}`;
}

function movCard(m) {
  return `<div class="mov-item">
    <div class="mov-body">
      <div class="mov-desc">${m.desc}</div>
      <div class="mov-meta">${m.fecha}${m.pagado && m.pagado !== 'Fondo' ? ' · ' + m.pagado : ''}</div>
    </div>
    <div class="mov-amount neg">-${fmtK(m.valor)}</div>
  </div>`;
}

function renderDetail(patente) {
  const c = CARS[patente];
  const gastos = [...c.movs]
    .filter(m => m.tipo === 'Gasto')
    .sort((a,b) => parseDate(a.fecha) - parseDate(b.fecha));
  return `
    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <div class="detail-title">${c.marca}</div>
          <div style="font-size:30px;color:var(--text1);margin-top:2px">${c.modelo}</div>
          <div class="detail-plate">${c.patente}</div>
        </div>
        <span class="badge ${c.vendido?'badge-vendido':'badge-stock'}">${c.vendido?'Vendido':'En stock'}</span>
      </div>
      <div style="border-top:0.5px solid var(--border);padding-top:12px">
        <div class="result-block"><span class="result-label">Fecha compra</span><span class="result-val">${c.fechaCompra}</span></div>
        ${c.fechaVenta ? `<div class="result-block"><span class="result-label">Fecha venta</span><span class="result-val">${c.fechaVenta}</span></div>` : ''}
        <div class="result-block"><span class="result-label">Compra</span><span class="result-val">${fmt(c.compra)}</span></div>
        <div class="result-block"><span class="result-label">Gastos</span><span class="result-val">${fmt(c.gastos)}</span></div>
        <div class="result-block"><span class="result-label" style="font-weight:500">Invertido</span><span class="result-val" style="font-size:30px">${fmt(c.inversion)}</span></div>
        ${c.vendido ? `
          <div class="result-block"><span class="result-label">Precio de venta</span><span class="result-val">${fmt(c.venta)}</span></div>
          <div class="result-block"><span class="result-label" style="font-weight:500">Ganancia</span>
            <span class="result-val" style="color:${c.ganancia>=0?'var(--green)':'var(--red)'};font-size:30px">${fmt(c.ganancia)}</span>
          </div>` : ''}
      </div>
    </div>
    <div class="section-label">gastos (${gastos.length})</div>
    ${gastos.map(movCard).join('')}`;
}

// ── SERVICE WORKER ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
